<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 中间人OpenAI API服务器</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="navbar-brand">中间人OpenAI API服务器</a>
            <ul class="navbar-menu">
                <li class="navbar-item">
                    <a href="index.html" class="navbar-link">请求列表</a>
                </li>
                <li class="navbar-item">
                    <a href="settings.html" class="navbar-link">系统设置</a>
                </li>
                <li class="navbar-item">
                    <a href="guide.html" class="navbar-link">配置指南</a>
                </li>
                <li class="navbar-item">
                    <a href="#" class="navbar-link logout-btn">退出登录</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="container content">
        <div class="card">
            <h2 class="card-title">系统设置</h2>
            
            <!-- 代理服务器配置 -->
            <div class="settings-section">
                <h3>代理服务器配置</h3>
                <form id="proxy-form" class="settings-form">
                    <div class="form-group">
                        <label for="proxy-enabled">
                            <input type="checkbox" id="proxy-enabled" name="enabled">
                            启用代理模式
                        </label>
                        <p class="form-hint">启用代理模式后，将转发请求到下面配置的目标API服务器</p>
                    </div>
                    
                    <div class="form-group">
                        <label for="target-url">目标API服务器地址</label>
                        <input type="url" id="target-url" name="targetURL" placeholder="https://api.example.com" class="form-control">
                    </div>
                    
                    <div class="form-group">
                        <label for="auth-type">认证类型</label>
                        <select id="auth-type" name="authType" class="form-control">
                            <option value="none">无认证</option>
                            <option value="basic">基本认证 (用户名/密码)</option>
                            <option value="token">令牌认证</option>
                        </select>
                    </div>
                    
                    <div id="basic-auth-fields" class="auth-fields" style="display: none;">
                        <div class="form-group">
                            <label for="username">用户名</label>
                            <input type="text" id="username" name="username" class="form-control">
                        </div>
                        <div class="form-group">
                            <label for="password">密码</label>
                            <input type="password" id="password" name="password" class="form-control">
                        </div>
                    </div>
                    
                    <div id="token-auth-fields" class="auth-fields" style="display: none;">
                        <div class="form-group">
                            <label for="token">访问令牌</label>
                            <input type="password" id="token" name="token" class="form-control">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">保存配置</button>
                    </div>
                </form>
            </div>
            
            <!-- 存储管理 -->
            <div class="settings-section">
                <h3>存储管理</h3>
                <div id="storage-stats" class="settings-info">
                    <p>正在加载存储信息...</p>
                </div>
                
                <div class="settings-actions">
                    <button id="export-data" class="btn">导出数据 (JSONL)</button>
                    <button id="clear-data" class="btn btn-danger">清空所有请求数据</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
