<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 假OpenAPI服务器</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2 class="login-title">假OpenAPI服务器</h2>
            <div class="alert alert-danger" id="error-alert" style="display: none;"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" id="username" class="form-control" placeholder="输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" id="password" class="form-control" placeholder="输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
            <p style="margin-top: 20px; text-align: center; color: #6c757d; font-size: 0.9rem;">
                用户名和密码会在服务器启动时打印到控制台
            </p>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
