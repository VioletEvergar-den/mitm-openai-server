<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>请求详情 - 中间人OpenAI API服务器</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="navbar-brand">中间人OpenAI API服务器</a>
            <ul class="navbar-menu">
                <li class="navbar-item">
                    <a href="index.html" class="navbar-link">请求列表</a>
                </li>
                <li class="navbar-item">
                    <a href="settings.html" class="navbar-link">系统设置</a>
                </li>
                <li class="navbar-item">
                    <a href="guide.html" class="navbar-link">配置指南</a>
                </li>
                <li class="navbar-item">
                    <a href="#" class="navbar-link logout-btn">退出登录</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="container content">
        <!-- 未找到请求提示 -->
        <div id="not-found-message" class="card" style="display: none;">
            <h2 class="card-title">未找到请求</h2>
            <p>请求不存在或已被删除。</p>
            <a href="index.html" class="btn btn-primary">返回请求列表</a>
        </div>

        <!-- 请求详情 -->
        <div id="request-detail" class="card">
            <div class="detail-header">
                <h2 class="detail-title">请求详情</h2>
                <div>
                    <button id="delete-btn" class="btn btn-danger">删除请求</button>
                    <a href="index.html" class="btn btn-primary">返回列表</a>
                </div>
            </div>

            <div class="detail-section">
                <h3 class="detail-section-title">基本信息</h3>
                <table class="table">
                    <tr>
                        <th>ID</th>
                        <td id="request-id"></td>
                    </tr>
                    <tr>
                        <th>时间戳</th>
                        <td id="request-timestamp"></td>
                    </tr>
                    <tr>
                        <th>请求方法</th>
                        <td id="request-method"></td>
                    </tr>
                    <tr>
                        <th>请求路径</th>
                        <td id="request-path"></td>
                    </tr>
                    <tr>
                        <th>IP地址</th>
                        <td id="request-ip"></td>
                    </tr>
                </table>
            </div>

            <div class="detail-section">
                <h3 class="detail-section-title">请求头</h3>
                <div id="request-headers" class="json-viewer"></div>
            </div>

            <div class="detail-section">
                <h3 class="detail-section-title">查询参数</h3>
                <div id="request-query" class="json-viewer"></div>
            </div>

            <div class="detail-section">
                <h3 class="detail-section-title">请求体</h3>
                <pre id="request-body" class="json-viewer"></pre>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
